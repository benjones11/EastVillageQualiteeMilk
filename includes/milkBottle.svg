<svg width="230" height="500" viewBox="0 0 230 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a8c4d0" stop-opacity=".75"/>
      <stop offset="14%"  stop-color="#d8eaf2" stop-opacity=".6"/>
      <stop offset="32%"  stop-color="#f2f8fb" stop-opacity=".8"/>
      <stop offset="52%"  stop-color="#ffffff"  stop-opacity=".88"/>
      <stop offset="70%"  stop-color="#e4f0f6" stop-opacity=".72"/>
      <stop offset="86%"  stop-color="#c0d8e4" stop-opacity=".62"/>
      <stop offset="100%" stop-color="#90b0c2" stop-opacity=".68"/>
    </linearGradient>
    <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#90b0c2" stop-opacity=".85"/>
      <stop offset="55%"  stop-color="#eef6fa" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#88a8bc" stop-opacity=".8"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7898a8"/>
      <stop offset="55%"  stop-color="#eef6fa"/>
      <stop offset="100%" stop-color="#7090a2"/>
    </linearGradient>
    <linearGradient id="rimGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8f2f6"/>
      <stop offset="100%" stop-color="#88a8b8"/>
    </linearGradient>
    <linearGradient id="bottomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b0c8d4" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#6888a0" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberTint" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#d4a84b" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity=".10"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <path d="M58,400 Q24,396 22,342 L20,205 Q18,158 34,130 L56,96 Q64,80 68,62 C70,48 76,36 115,34 C154,36 160,48 162,62 Q166,80 174,96 L196,130 Q212,158 210,205 L208,342 Q206,396 172,400 Z"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <ellipse cx="115" cy="406" rx="58" ry="11" fill="url(#bottomGrad)" stroke="#6888a0" stroke-width="1.5"/>

  <!-- Body -->
  <path d="M58,400 Q24,396 22,342 L20,205 Q18,158 34,130 L56,96 Q64,80 68,62 C70,48 76,36 115,34 C154,36 160,48 162,62 Q166,80 174,96 L196,130 Q212,158 210,205 L208,342 Q206,396 172,400 Z"
    fill="url(#glassBody)" stroke="#88aabf" stroke-width="1.5"/>

  <!-- Amber tint -->
  <path d="M58,400 Q24,396 22,342 L20,205 Q18,158 34,130 L56,96 Q64,80 68,62 C70,48 76,36 115,34 C154,36 160,48 162,62 Q166,80 174,96 L196,130 Q212,158 210,205 L208,342 Q206,396 172,400 Z"
    fill="url(#amberTint)"/>

  <!-- Shimmer -->
  <rect x="0" y="0" width="230" height="500" fill="url(#shimmerGrad)" clip-path="url(#bodyClip)" class="shimmer"/>

  <!-- Edge highlights -->
  <path d="M22,280 Q20,230 28,180 L44,135 L58,102 Q64,85 68,65" fill="none" stroke="#fff" stroke-width="3" stroke-opacity=".4" stroke-linecap="round"/>
  <path d="M208,280 Q210,230 202,180 L186,135 L172,102 Q166,85 162,65" fill="none" stroke="#6888a0" stroke-width="2.5" stroke-opacity=".3" stroke-linecap="round"/>

  <!-- Embossed text -->
  <path d="M82,200 L115,172 L148,200 L115,288 Z" fill="none" stroke="#88aabf" stroke-width=".9" stroke-opacity=".55"/>
  <text x="115" y="205" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="600" fill="#6888a0" fill-opacity=".7" letter-spacing="3">ONE PINT</text>
  <path id="topArc" d="M 50 295 A 70 65 0 0 1 180 295" fill="none"/>
  <text font-family="Georgia,serif" font-size="9" fill="#6888a0" fill-opacity=".62" letter-spacing="1.8">
    <textPath href="#topArc" startOffset="6%">GUARANTEE DAIRY PRODUCTS</textPath>
  </text>
  <text x="115" y="316" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#6888a0" fill-opacity=".62" letter-spacing="2">Quality</text>
  <path id="botArc" d="M 58 358 A 64 55 0 0 0 172 358" fill="none"/>
  <text font-family="Georgia,serif" font-size="9" fill="#6888a0" fill-opacity=".55" letter-spacing="1.5">
    <textPath href="#botArc" startOffset="8%">SAN DIEGO · CALIF.</textPath>
  </text>
  <line x1="48" y1="228" x2="182" y2="228" stroke="#88aabf" stroke-width=".8" stroke-opacity=".45"/>
  <line x1="52" y1="342" x2="178" y2="342" stroke="#88aabf" stroke-width=".8" stroke-opacity=".45"/>

  <!-- Neck -->
  <path d="M 68,62 C 70,48 80,32 96,26 L 134,26 C 150,32 160,48 162,62 Z"
    fill="url(#neckGrad)" stroke="#88aabf" stroke-width="1.2"/>
  <path d="M 68,60 C 70,46 80,31 97,26" fill="none" stroke="#fff" stroke-width="2" stroke-opacity=".45" stroke-linecap="round"/>

  <!-- Rim -->
  <rect x="88" y="18" width="54" height="11" rx="3" fill="url(#rimGrad)" stroke="#7090a2" stroke-width="1"/>
  <ellipse cx="115" cy="17" rx="28" ry="7" fill="url(#rimGradV)" stroke="#7090a2" stroke-width="1.2"/>
  <ellipse cx="108" cy="14" rx="14" ry="3.5" fill="#fff" fill-opacity=".5"/>
  <ellipse cx="120" cy="19" rx="10" ry="3" fill="#d4a84b" fill-opacity=".18"/>
  <ellipse cx="115" cy="14" rx="16" ry="4" fill="#1a2830" fill-opacity=".6"/>
  <ellipse cx="115" cy="13" rx="13" ry="2.5" fill="#0a1820" fill-opacity=".75"/>

  <!-- Hotspots -->
  <g class="hotspot" onclick="showPanel('rim')">
    <circle class="dot" cx="150" cy="13" r="9"/>
    <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">+</text>
  </g>
  <g class="hotspot" onclick="showPanel('neck')">
    <circle class="dot" cx="60" cy="44" r="9"/>
    <text x="60" y="49" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">+</text>
  </g>
  <g class="hotspot" onclick="showPanel('pint')">
    <circle class="dot" cx="170" cy="205" r="9"/>
    <text x="170" y="210" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">+</text>
  </g>
  <g class="hotspot" onclick="showPanel('dairy')">
    <circle class="dot" cx="36" cy="295" r="9"/>
    <text x="36" y="300" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">+</text>
  </g>
  <g class="hotspot" onclick="showPanel('glass')">
    <circle class="dot" cx="115" cy="422" r="9"/>
    <text x="115" y="427" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">+</text>
  </g>
</svg>